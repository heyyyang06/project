<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Topic</title>
<style>
body{
    margin:0;
    background:#fdf9f1;
    color:#000;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:100%;
    max-width:500px;
    text-align:center;
}
h1{
    font-size:32px;
    margin-bottom:40px;
}
.roulette{
    height:180px;
    overflow:hidden;
    position:relative;
}
.list{
    position:absolute;
    width:100%;
}
.item{
    height:60px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    transition:opacity 0.2s, transform 0.2s;
}
.fade{
    opacity:0.2;
}
.active{
    opacity:1;
    font-weight:700;
    transform:scale(1.05);
}
button{
    margin-top:40px;
    border:2px solid #000;
    background:#000;
    color:#fff;
    padding:12px 20px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
    <h1>Topic</h1>

    <div class="roulette">
        <div class="list" id="list"></div>
    </div>

    <button onclick="spin()">돌리기</button>
</div>

<script>
const topics = [
"Travel","Success","AI","Health","Education",
"Technology","Friendship","Money","Competition","Social Media"
];

const list = document.getElementById("list");

// 반복
let extended = [...topics, ...topics, ...topics];

extended.forEach(t=>{
    const div = document.createElement("div");
    div.className="item fade";
    div.innerText=t;
    list.appendChild(div);
});

function updateHighlight(position){
    const items = document.querySelectorAll(".item");
    items.forEach((el,i)=>{
        const y = i*60 - position;
        if(y >= 60 && y < 120){
            el.classList.add("active");
            el.classList.remove("fade");
        } else {
            el.classList.remove("active");
            el.classList.add("fade");
        }
    });
}

function spin(){
    let position = 0;
    let velocity = 45;

    function animate(){
        position += velocity;
        velocity *= 0.96;

        list.style.transform = `translateY(-${position}px)`;
        updateHighlight(position);

        if(velocity > 0.5){
            requestAnimationFrame(animate);
        }
    }

    animate();
}
</script>

</body>
</html>
