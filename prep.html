<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Prep</title></head>
<body style="font-family:sans-serif">
<h1>1분 생각 정리</h1>
<p id="topic"></p>
<h2 id="timer">60</h2>
<button onclick="start()">생각 시작</button>
<button onclick="next()">말하기로 이동</button>

<script>
document.getElementById("topic").innerText = localStorage.getItem("topic");
function start(){
  let t=60;
  const i=setInterval(()=>{
    t--;
    document.getElementById("timer").innerText=t;
    if(t<=0) clearInterval(i);
  },1000);
}
function next(){
  location.href="speak.html";
}
</script>
</body></html>
