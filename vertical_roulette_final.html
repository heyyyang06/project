<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Topic</title>
<style>
body{
    margin:0;
    background:#fdf9f1;
    color:#000;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}
h1{
    font-size:40px;
    margin-bottom:40px;
    border:1px solid #000; /* 얇은 테두리 */
    padding:10px 30px;
}

/* 크기 유지 */
.roulette{
    height:46vh;
    width:100%;
    max-width:480px;
    overflow:hidden;
    position:relative;
}

.list{
    position:absolute;
    width:100%;
}

.item{
    height:15vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    opacity:0.2;
    transition:all 0.2s;
}

.active{
    opacity:1;
    font-weight:700;
    transform:scale(1.04);
}

button{
    margin-top:40px;
    border:2px solid #000;
    background:#000;
    color:#fff;
    padding:12px 24px;
    cursor:pointer;
    font-size:16px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Topic</h1>

    <div class="roulette">
        <div class="list" id="list"></div>
    </div>

    <button onclick="spin()">돌리기</button>
</div>

<script>
const topics = [
"Travel","Success","AI","Health","Education",
"Technology","Friendship","Money","Competition","Social Media"
];

const list = document.getElementById("list");

let extended = [...topics, ...topics, ...topics, ...topics];

extended.forEach(t=>{
    const div = document.createElement("div");
    div.className="item";
    div.innerText=t;
    list.appendChild(div);
});

function updateHighlight(position){
    const items = document.querySelectorAll(".item");
    const itemHeight = window.innerHeight * 0.15;
    items.forEach((el,i)=>{
        const y = i*itemHeight - position;
        if(y >= itemHeight && y < itemHeight*2){
            el.classList.add("active");
        } else {
            el.classList.remove("active");
        }
    });
}

function spin(){
    let position = 0;
    let velocity = 70;

    function animate(){
        position += velocity;
        velocity *= 0.975;

        list.style.transform = `translateY(-${position}px)`;
        updateHighlight(position);

        if(velocity > 0.4){
            requestAnimationFrame(animate);
        }
    }

    animate();
}
</script>

</body>
</html>
