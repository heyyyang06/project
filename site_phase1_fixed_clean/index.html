<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<style>
body{margin:0;background:#fdf9f1;font-family:sans-serif;display:flex;justify-content:center;align-items:center;height:100vh}
.container{text-align:center;width:100%;max-width:600px}
h1{border:1px solid #000;padding:10px;margin-bottom:30px;font-size:40px}
.roulette{height:45vh;overflow:hidden;position:relative}
.list{position:absolute;width:100%}
.item{height:15vh;display:flex;align-items:center;justify-content:center;font-size:32px;opacity:.2;transition:.2s}
.active{opacity:1;font-weight:bold;transform:scale(1.05)}
button{margin-top:15px;padding:12px;background:#000;color:#fff;border:2px solid #000;width:100%}
.fade-in{opacity:0;transform:translateY(10px);transition:all 0.5s ease;}
.show{opacity:1;transform:translateY(0);}
</style></head>

<body>
<div class="container">
<h1>Topic</h1>
<div class="roulette"><div id="list" class="list"></div></div>

<button onclick="spin()">Spin</button>
<button id="nextBtn" class="fade-in" style="display:none" onclick="goNext()">Go to Think</button>

</div>

<script>
const topics=["Travel","Success","AI","Health","Education","Money","Friendship","Technology"];
const list=document.getElementById("list");
const nextBtn=document.getElementById("nextBtn");

const itemHeight = window.innerHeight * 0.15;
const centerY = itemHeight * 1.5;

let extended=[...topics,...topics,...topics,...topics];
extended.forEach(t=>{
 let d=document.createElement("div");
 d.className="item";
 d.innerText=t;
 list.appendChild(d);
});

function spin(){
 nextBtn.style.display="none";
 nextBtn.classList.remove("show");

 const randomIndex=Math.floor(Math.random()*topics.length)+topics.length;
 const target=(randomIndex*itemHeight)-itemHeight;

 let position=0;
 let velocity=70;

 function animate(){
  position+=velocity;
  velocity *= 0.98;

  if(position >= target){
    position = target;
    velocity = 0;
  }

  list.style.transform=`translateY(-${position}px)`;

  // 핵심: 하나만 선택
  let closestIndex = 0;
  let minDist = Infinity;

  document.querySelectorAll(".item").forEach((el,i)=>{
    const elCenter = i*itemHeight - position + itemHeight/2;
    const dist = Math.abs(elCenter - centerY);
    if(dist < minDist){
      minDist = dist;
      closestIndex = i;
    }
  });

  document.querySelectorAll(".item").forEach((el,i)=>{
    el.classList.toggle("active", i === closestIndex);
  });

  if(velocity > 0.2){
    requestAnimationFrame(animate);
  }else{
    localStorage.setItem("topic",extended[randomIndex]);

    setTimeout(()=>{
      nextBtn.style.display="block";
      setTimeout(()=>nextBtn.classList.add("show"),10);
    },1600);
  }
 }

 animate();
}

function goNext(){
 location.href="prep.html";
}
</script>
</body></html>
