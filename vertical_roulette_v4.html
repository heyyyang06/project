<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Topic</title>
<style>
body{
    margin:0;
    background:#fdf9f1;
    color:#000;
    font-family:sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.container{
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}
h1{
    font-size:48px;
    margin-bottom:60px;
}
.roulette{
    height:60vh;
    width:100%;
    max-width:600px;
    overflow:hidden;
    position:relative;
}
.list{
    position:absolute;
    width:100%;
}
.item{
    height:20vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:36px;
    transition:opacity 0.2s, transform 0.2s;
}
.fade{
    opacity:0.2;
}
.active{
    opacity:1;
    font-weight:700;
    transform:scale(1.08);
}
button{
    margin-top:60px;
    border:2px solid #000;
    background:#000;
    color:#fff;
    padding:14px 30px;
    cursor:pointer;
    font-size:18px;
}
</style>
</head>
<body>

<div class="container">
    <h1>Topic</h1>

    <div class="roulette">
        <div class="list" id="list"></div>
    </div>

    <button onclick="spin()">돌리기</button>
</div>

<script>
const topics = [
"Travel","Success","AI","Health","Education",
"Technology","Friendship","Money","Competition","Social Media"
];

const list = document.getElementById("list");

// 반복
let extended = [...topics, ...topics, ...topics, ...topics];

extended.forEach(t=>{
    const div = document.createElement("div");
    div.className="item fade";
    div.innerText=t;
    list.appendChild(div);
});

function updateHighlight(position){
    const items = document.querySelectorAll(".item");
    const itemHeight = window.innerHeight * 0.2;
    items.forEach((el,i)=>{
        const y = i*itemHeight - position;
        if(y >= itemHeight && y < itemHeight*2){
            el.classList.add("active");
            el.classList.remove("fade");
        } else {
            el.classList.remove("active");
            el.classList.add("fade");
        }
    });
}

function spin(){
    let position = 0;
    let velocity = 80; // 더 빠르게 시작

    function animate(){
        position += velocity;
        velocity *= 0.985; // 더 천천히 감속 (오래 돌게)

        list.style.transform = `translateY(-${position}px)`;
        updateHighlight(position);

        if(velocity > 0.3){
            requestAnimationFrame(animate);
        }
    }

    animate();
}
</script>

</body>
</html>
